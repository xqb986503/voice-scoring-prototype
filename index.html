<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>语音评分设置交互原型</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f7f8fa;
      --panel: #ffffff;
      --ink: #20242a;
      --body: #565c63;
      --muted: #8d939b;
      --line: #e8eaee;
      --green: #34a978;
      --green-dark: #228060;
      --green-soft: #ecf8f3;
      --blue: #4d8df7;
      --blue-soft: #eef5ff;
      --aqua: #d2f5f4;
      --aqua-line: #78c4ca;
      --orange: #f4ad32;
      --orange-soft: #fff5df;
      --red: #ef6b6b;
      --shadow: 0 16px 42px rgba(28, 35, 43, 0.13);
      --soft-shadow: 0 8px 22px rgba(28, 35, 43, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px minmax(0, 1fr);
      background: linear-gradient(#fbfbfc 0 56px, #fff 56px);
    }

    .topbar {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(240px, 1fr) minmax(460px, 1.2fr) minmax(240px, 1fr);
      align-items: center;
      height: 56px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
    }

    .title-wrap {
      justify-self: center;
      width: min(720px, 100%);
    }

    .lesson-title {
      margin: 0 0 7px;
      text-align: center;
      font-size: 16px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .progress-row {
      display: grid;
      grid-template-columns: repeat(8, minmax(42px, 1fr)) auto;
      align-items: center;
      gap: 5px;
    }

    .progress-segment {
      height: 6px;
      border-radius: 999px;
      background: #dde2e6;
    }

    .progress-segment.done {
      background: #45b588;
    }

    .progress-segment.active {
      border: 2px solid #8cbaff;
      background: #d5e8ff;
    }

    .progress-count {
      min-width: 42px;
      color: var(--green);
      font-size: 18px;
      line-height: 1;
      font-weight: 800;
    }

    .timer {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 18px;
      color: #7a8088;
      font-size: 15px;
      white-space: nowrap;
    }

    .timer strong {
      color: #989da4;
      font-size: 17px;
      font-weight: 650;
    }

    .toolbar {
      justify-self: end;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 22px;
      margin-left: 26px;
      color: #7c8289;
      font-size: 17px;
      font-weight: 720;
    }

    .toolbar-button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 40px;
      color: #7c8289;
    }

    .toolbar-button:hover {
      color: #3d4248;
    }

    .gear {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid currentColor;
      font-size: 0;
      position: relative;
    }

    .gear::before,
    .gear::after {
      content: "";
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
    }

    .gear::after {
      width: 18px;
      height: 2px;
      border-radius: 999px;
      transform: rotate(45deg);
      background: currentColor;
    }

    .back-symbol {
      position: relative;
      width: 17px;
      height: 17px;
      border: 2px solid currentColor;
      border-left: 0;
    }

    .back-symbol::after {
      content: "";
      position: absolute;
      left: -6px;
      top: 4px;
      width: 8px;
      height: 8px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
    }

    .workspace {
      position: relative;
      display: grid;
      justify-items: center;
      align-content: start;
      min-height: calc(100vh - 56px);
      padding: 16px 24px 108px;
      background: #fff;
    }

    .question-card {
      width: min(960px, calc(100vw - 280px));
      min-height: min(810px, calc(100vh - 170px));
      padding: 38px 32px;
      border-radius: 14px;
      background: var(--aqua);
    }

    .question-hint {
      margin: 0 0 11px;
      color: #98a0a6;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 760;
    }

    .question-cn {
      margin: 0 0 53px;
      color: #15191f;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 760;
    }

    .sentence {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: center;
      gap: 22px 28px;
      color: #0f141a;
      font-size: 24px;
      line-height: 1.2;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-weight: 780;
    }

    .blank {
      display: inline-block;
      width: 61px;
      height: 28px;
      border-bottom: 2px solid var(--aqua-line);
    }

    .question-feedback {
      margin-top: 29px;
      color: #8c969b;
      font-size: 16px;
      font-weight: 760;
    }

    .voice-feedback {
      margin-top: 24px;
      display: none;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 800;
    }

    .voice-feedback.show {
      display: inline-flex;
    }

    .voice-feedback.encourage {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .voice-feedback.precise {
      background: var(--blue-soft);
      color: #3266b7;
    }

    .bottom-actions {
      position: fixed;
      left: 50%;
      bottom: 32px;
      z-index: 5;
      display: grid;
      grid-template-columns: 42px 242px 42px;
      align-items: center;
      gap: 22px;
      transform: translateX(-50%);
    }

    .circle-nav {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 2px solid #b9d9dd;
      border-radius: 12px;
      color: #68aeb7;
      font-size: 26px;
      line-height: 1;
      font-weight: 400;
    }

    .primary-next {
      height: 48px;
      border-radius: 8px;
      background: #c9eeee;
      color: #fff;
      font-size: 18px;
      font-weight: 850;
    }

    .submit-tip {
      position: absolute;
      top: 56px;
      left: 50%;
      color: #9ba0a6;
      font-size: 15px;
      font-weight: 720;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .hamburger {
      position: fixed;
      left: 4px;
      bottom: 8px;
      z-index: 5;
      display: grid;
      place-items: center;
      width: 33px;
      height: 33px;
      border-radius: 4px;
      background: #3f638f;
      color: #fff;
    }

    .hamburger span,
    .hamburger::before,
    .hamburger::after {
      content: "";
      width: 22px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
    }

    .hamburger {
      gap: 3px;
    }

    .help-bulb {
      position: fixed;
      right: 21%;
      bottom: 110px;
      z-index: 5;
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #f8b23f;
      box-shadow: 0 12px 24px rgba(244, 173, 50, 0.22);
    }

    .bulb-mark {
      width: 19px;
      height: 22px;
      border: 4px solid #fff;
      border-bottom-width: 7px;
      border-radius: 50% 50% 44% 44%;
      position: relative;
    }

    .bulb-mark::before,
    .bulb-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 4px;
      height: 6px;
      border-radius: 999px;
      background: #fff;
      transform: translateX(-50%);
    }

    .bulb-mark::before {
      top: -14px;
    }

    .bulb-mark::after {
      bottom: -16px;
    }

    .settings-menu,
    .mode-submenu {
      position: absolute;
      right: 54px;
      top: 51px;
      z-index: 30;
      width: 204px;
      padding: 10px 0;
      border: 1px solid #e5e9ee;
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--soft-shadow);
    }

    .settings-menu[hidden],
    .mode-submenu[hidden] {
      display: none;
    }

    .settings-menu {
      right: 38px;
    }

    .mode-submenu {
      right: 246px;
      top: 157px;
      width: 262px;
      padding: 8px;
    }

    .menu-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 36px;
      padding: 0 13px;
      color: #4f545a;
      font-size: 15px;
      font-weight: 720;
      text-align: left;
      white-space: nowrap;
    }

    .menu-row:hover,
    .menu-row.active {
      background: #f5f7f9;
    }

    .menu-icon {
      display: grid;
      place-items: center;
      width: 21px;
      height: 21px;
      color: #666c73;
      font-size: 17px;
      font-weight: 650;
    }

    .menu-value {
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 850;
    }

    .arrow-right {
      width: 7px;
      height: 7px;
      border-top: 1.8px solid currentColor;
      border-right: 1.8px solid currentColor;
      transform: rotate(45deg);
      color: #6d737a;
    }

    .mode-option {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 8px;
      width: 100%;
      min-height: 68px;
      padding: 10px 11px;
      border-radius: 7px;
      text-align: left;
    }

    .mode-option:hover {
      background: #f5f7f9;
    }

    .mode-option.selected {
      background: var(--green-soft);
    }

    .checkmark {
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      margin-top: 1px;
      border-radius: 50%;
      color: var(--green-dark);
      font-size: 17px;
      font-weight: 900;
    }

    .mode-option:not(.selected) .checkmark {
      border: 1px solid #d3d8de;
      color: transparent;
      font-size: 0;
    }

    .mode-name {
      color: #343940;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 850;
    }

    .mode-name,
    .mode-copy {
      display: block;
    }

    .mode-copy {
      margin-top: 5px;
      color: #7e858d;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 660;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(18, 25, 32, 0.18);
      backdrop-filter: blur(2px);
    }

    .overlay[hidden] {
      display: none;
    }

    .onboarding {
      width: min(640px, calc(100vw - 42px));
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .onboarding.simple {
      width: min(432px, calc(100vw - 42px));
      border: 1px solid rgba(225, 230, 235, 0.9);
      border-radius: 14px;
      box-shadow: 0 18px 48px rgba(26, 34, 43, 0.16);
    }

    .onboarding-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      padding: 28px 30px 20px;
      border-bottom: 1px solid var(--line);
    }

    .onboarding.simple .onboarding-head {
      padding: 18px 18px 10px;
      border-bottom: 0;
      align-items: center;
    }

    .onboarding-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .voice-mini-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--green-soft);
      flex: 0 0 auto;
    }

    .voice-mini-icon::before {
      content: "";
      width: 10px;
      height: 17px;
      border: 2px solid var(--green-dark);
      border-radius: 999px;
    }

    .voice-mini-icon::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 9px;
      width: 18px;
      height: 9px;
      border: 2px solid var(--green-dark);
      border-top: 0;
      border-radius: 0 0 12px 12px;
      transform: translateX(-50%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 850;
    }

    .onboarding-title {
      margin: 12px 0 8px;
      color: #20242a;
      font-size: 30px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .onboarding.simple .onboarding-title {
      margin: 0 0 4px;
      font-size: 22px;
    }

    .onboarding-subtitle {
      margin: 0;
      color: #68707a;
      font-size: 16px;
      line-height: 1.58;
      font-weight: 620;
    }

    .onboarding.simple .onboarding-subtitle {
      font-size: 14px;
      line-height: 1.4;
    }

    .close-button {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: #838a93;
      font-size: 26px;
      line-height: 1;
    }

    .onboarding.simple .close-button {
      width: 30px;
      height: 30px;
      font-size: 22px;
    }

    .close-button:hover {
      background: #f3f5f7;
    }

    .onboarding-body {
      display: grid;
      gap: 16px;
      padding: 22px 30px 26px;
    }

    .onboarding-body.compact {
      gap: 14px;
      padding: 22px 24px 18px;
    }

    .onboarding.simple .onboarding-body.compact {
      padding: 4px 16px 14px;
    }

    .setup-row {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 13px;
      align-items: start;
    }

    .step-number {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #eef2f5;
      color: #59616a;
      font-size: 15px;
      font-weight: 900;
    }

    .setup-title {
      margin: 3px 0 4px;
      color: #2f343b;
      font-size: 17px;
      font-weight: 900;
    }

    .setup-copy {
      margin: 0;
      color: #7b838c;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 620;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 11px;
    }

    .mode-card {
      min-height: 104px;
      padding: 15px 15px 13px;
      border: 2px solid #e3e7eb;
      border-radius: 10px;
      background: #fff;
      text-align: left;
    }

    .mode-card.simple-mode-option {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 11px;
      align-items: center;
      width: 100%;
      min-height: 66px;
      padding: 11px 13px;
      border-width: 1px;
      border-radius: 9px;
    }

    .simple-mode-list {
      display: grid;
      gap: 8px;
    }

    .radio-mark {
      display: grid;
      place-items: center;
      width: 21px;
      height: 21px;
      border: 1px solid #cfd6dd;
      border-radius: 50%;
      color: transparent;
      font-size: 14px;
      font-weight: 900;
    }

    .mode-card.simple-mode-option.selected .radio-mark {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .simple-mode-text {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .simple-mode-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .simple-mode-name {
      color: #252a30;
      font-size: 16px;
      font-weight: 900;
      white-space: nowrap;
    }

    .simple-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      padding: 0 7px;
      border-radius: 999px;
      background: #d8f0e7;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 850;
    }

    .mode-card.simple-mode-option:not(.selected) .simple-pill {
      background: #eef2f5;
      color: #8a929a;
    }

    .simple-mode-copy {
      color: #737b84;
      font-size: 13px;
      line-height: 1.35;
      font-style: normal;
      font-weight: 700;
    }

    .mode-card.selected {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .mode-card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #2d333a;
      font-size: 18px;
      font-weight: 900;
    }

    .mode-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef2f5;
      color: #77808a;
      font-size: 12px;
      font-weight: 850;
    }

    .mode-card.selected .mode-pill {
      background: #d7f0e6;
      color: var(--green-dark);
    }

    .mode-card-copy,
    .mode-example {
      display: block;
    }

    .mode-card-copy {
      margin: 10px 0 0;
      color: #525960;
      font-size: 15px;
      line-height: 1.42;
      font-weight: 760;
    }

    .mode-example {
      margin-top: 9px;
      color: #858c94;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 650;
    }

    .simple-note {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 44px;
      padding: 0 13px;
      border-radius: 8px;
      background: #f6f8fa;
      color: #727a83;
      font-size: 14px;
      font-weight: 700;
    }

    .note-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex: 0 0 auto;
    }

    .mic-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-top: 11px;
      padding: 12px 13px;
      border-radius: 10px;
      background: #f6f8fa;
    }

    .sample-sentence {
      color: #31363c;
      font-size: 17px;
      line-height: 1.35;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-weight: 780;
    }

    .mic-panel.voice-check {
      grid-template-columns: minmax(0, 1fr) auto auto;
    }

    .meter {
      display: flex;
      align-items: end;
      gap: 4px;
      min-width: 78px;
      height: 34px;
    }

    .bar {
      width: 7px;
      border-radius: 999px;
      background: #b7dacf;
      animation: pulse 1s ease-in-out infinite;
    }

    .bar:nth-child(1) {
      height: 13px;
      animation-delay: 0s;
    }

    .bar:nth-child(2) {
      height: 24px;
      animation-delay: 0.12s;
    }

    .bar:nth-child(3) {
      height: 30px;
      animation-delay: 0.24s;
    }

    .bar:nth-child(4) {
      height: 18px;
      animation-delay: 0.36s;
    }

    .bar:nth-child(5) {
      height: 26px;
      animation-delay: 0.48s;
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scaleY(0.72);
        opacity: 0.62;
      }

      50% {
        transform: scaleY(1);
        opacity: 1;
      }
    }

    .secondary-action,
    .primary-action,
    .text-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 900;
    }

    .secondary-action {
      padding: 0 18px;
      border: 1px solid #dce2e7;
      background: #fff;
      color: #58616b;
    }

    .secondary-action.done {
      border-color: #ccebdc;
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .primary-action {
      min-width: 142px;
      padding: 0 20px;
      background: var(--green);
      color: #fff;
    }

    .text-action {
      padding: 0 14px;
      color: #79818a;
    }

    .onboarding-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 30px 28px;
    }

    .onboarding.simple .onboarding-footer {
      padding: 0 16px 18px;
    }

    .onboarding.simple .primary-action {
      width: 100%;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 70;
      display: none;
      min-height: 42px;
      padding: 0 18px;
      align-items: center;
      border-radius: 999px;
      background: rgba(32, 36, 42, 0.9);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      transform: translateX(-50%);
      box-shadow: 0 12px 28px rgba(24, 29, 36, 0.2);
    }

    .toast.show {
      display: inline-flex;
      animation: toastIn 0.18s ease-out;
    }

    @keyframes toastIn {
      from {
        transform: translate(-50%, 10px);
        opacity: 0;
      }

      to {
        transform: translate(-50%, 0);
        opacity: 1;
      }
    }

    button:focus-visible {
      outline: 3px solid rgba(77, 141, 247, 0.28);
      outline-offset: 2px;
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }

      .title-wrap {
        justify-self: start;
      }

      .timer {
        display: none;
      }

      .toolbar {
        margin-left: 0;
      }

      .question-card {
        width: min(760px, calc(100vw - 34px));
        min-height: 560px;
      }

      .mode-submenu {
        right: 16px;
        top: 344px;
      }
    }

    @media (max-width: 680px) {
      .app {
        grid-template-rows: auto minmax(0, 1fr);
      }

      .topbar {
        min-height: 84px;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px 12px;
      }

      .toolbar {
        justify-self: end;
      }

      .lesson-title {
        text-align: left;
      }

      .progress-row {
        grid-template-columns: repeat(8, minmax(16px, 1fr)) auto;
      }

      .workspace {
        padding: 14px 12px 112px;
      }

      .question-card {
        width: 100%;
        min-height: 500px;
        padding: 24px 18px;
      }

      .question-hint {
        font-size: 20px;
      }

      .question-cn,
      .sentence {
        font-size: 20px;
      }

      .bottom-actions {
        grid-template-columns: 40px minmax(160px, 220px) 40px;
        gap: 12px;
      }

      .settings-menu {
        right: 10px;
        top: 79px;
      }

      .mode-submenu {
        right: 10px;
        top: 260px;
        width: min(270px, calc(100vw - 20px));
      }

      .mode-grid {
        grid-template-columns: 1fr;
      }

      .onboarding-head,
      .onboarding-body,
      .onboarding-footer {
        padding-left: 18px;
        padding-right: 18px;
      }

      .onboarding-title {
        font-size: 24px;
      }

      .mic-panel {
        grid-template-columns: 1fr;
      }

      .mic-panel.voice-check {
        grid-template-columns: 1fr;
      }

      .onboarding-footer {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div></div>
      <div class="title-wrap">
        <h1 class="lesson-title">句型精练 " How can ... get (to) ...? "</h1>
        <div class="progress-row" aria-label="练习进度 6/8">
          <span class="progress-segment done"></span>
          <span class="progress-segment done"></span>
          <span class="progress-segment done"></span>
          <span class="progress-segment done"></span>
          <span class="progress-segment done"></span>
          <span class="progress-segment active"></span>
          <span class="progress-segment"></span>
          <span class="progress-segment"></span>
          <span class="progress-count">6/8</span>
        </div>
      </div>
      <div class="timer">
        <span>已用时：</span>
        <strong>00:00:53</strong>
        <div class="toolbar">
          <button class="toolbar-button" id="settingsButton" type="button" aria-expanded="false">
            <span class="gear" aria-hidden="true"></span>
            <span>设置</span>
          </button>
          <button class="toolbar-button" type="button">
            <span class="back-symbol" aria-hidden="true"></span>
            <span>返回</span>
          </button>

          <div class="settings-menu" id="settingsMenu" hidden>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">↻</span>
              <span>重新开始</span>
              <span></span>
            </button>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">▣</span>
              <span>单元打印</span>
              <span></span>
            </button>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">♪</span>
              <span>提示音设置</span>
              <span></span>
            </button>
            <button class="menu-row active" id="modeMenuRow" type="button">
              <span class="menu-icon" aria-hidden="true">◉</span>
              <span>语音评分模式</span>
              <span class="menu-value" id="modeMenuValue">鼓励</span>
              <span class="arrow-right" aria-hidden="true"></span>
            </button>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">▶</span>
              <span>播放模式切换</span>
              <span class="arrow-right" aria-hidden="true"></span>
            </button>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">Aa</span>
              <span>字号调整</span>
              <span class="arrow-right" aria-hidden="true"></span>
            </button>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">□</span>
              <span>单元演示</span>
              <span></span>
            </button>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">▱</span>
              <span>填充答案</span>
              <span></span>
            </button>
            <button class="menu-row" type="button">
              <span class="menu-icon" aria-hidden="true">≫</span>
              <span>倍速调整</span>
              <span class="arrow-right" aria-hidden="true"></span>
            </button>
            <button class="menu-row" id="tutorialMenuRow" type="button">
              <span class="menu-icon" aria-hidden="true">?</span>
              <span>语音设置</span>
              <span class="arrow-right" aria-hidden="true"></span>
            </button>
          </div>

          <div class="mode-submenu" id="modeSubmenu" hidden>
            <button class="mode-option selected" type="button" data-mode="encourage">
              <span class="checkmark" aria-hidden="true">✓</span>
              <span>
                <span class="mode-name">鼓励模式</span>
                <span class="mode-copy">文字反馈，70分通关</span>
              </span>
            </button>
            <button class="mode-option" type="button" data-mode="precise">
              <span class="checkmark" aria-hidden="true">✓</span>
              <span>
                <span class="mode-name">精准模式</span>
                <span class="mode-copy">显示分数，85分通关</span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace">
      <section class="question-card" aria-label="句型练习题">
        <p class="question-hint">根据汉语意思完成句子</p>
        <p class="question-cn">我们怎样到达银行?</p>
        <div class="sentence">
          <span class="blank" aria-label="空格"></span>
          <span>can we get</span>
          <span class="blank" aria-label="空格"></span>
          <span>the</span>
          <span class="blank" aria-label="空格"></span>
          <span>?</span>
        </div>
        <div class="question-feedback">问题反馈</div>
        <div class="voice-feedback encourage show" id="voiceFeedback">
          <span id="feedbackMain">良好！可以进入下一题</span>
          <span id="feedbackSub">当前：鼓励模式</span>
        </div>
      </section>

      <button class="help-bulb" id="helpButton" type="button" aria-label="打开语音设置">
        <span class="bulb-mark" aria-hidden="true"></span>
      </button>

      <div class="bottom-actions">
        <button class="circle-nav" type="button" aria-label="上一题">‹</button>
        <button class="primary-next" type="button">next</button>
        <button class="circle-nav" type="button" aria-label="下一题">›</button>
        <span class="submit-tip">回车/双击也可提交</span>
      </div>
    </main>

    <button class="hamburger" type="button" aria-label="打开侧边栏">
      <span aria-hidden="true"></span>
    </button>
  </div>

  <div class="overlay" id="onboardingOverlay">
    <section class="onboarding simple" role="dialog" aria-modal="true" aria-labelledby="onboardingTitle">
      <header class="onboarding-head">
        <div class="onboarding-title-row">
          <span class="voice-mini-icon" aria-hidden="true"></span>
          <div>
            <h2 class="onboarding-title" id="onboardingTitle">语音评分模式</h2>
            <p class="onboarding-subtitle">右上角设置里可随时切换语音评分模式。</p>
          </div>
        </div>
        <button class="close-button" id="closeOnboarding" type="button" aria-label="关闭">×</button>
      </header>

      <div class="onboarding-body compact">
        <div class="simple-mode-list">
          <button class="mode-card simple-mode-option selected" type="button" data-mode="encourage">
            <span class="radio-mark" aria-hidden="true">✓</span>
            <span class="simple-mode-text">
              <span class="simple-mode-line">
                <span class="simple-mode-name">鼓励模式</span>
                <span class="simple-pill">默认</span>
              </span>
              <span class="simple-mode-copy">文字反馈，70分通关</span>
            </span>
          </button>
          <button class="mode-card simple-mode-option" type="button" data-mode="precise">
            <span class="radio-mark" aria-hidden="true">✓</span>
            <span class="simple-mode-text">
              <span class="simple-mode-line">
                <span class="simple-mode-name">精准模式</span>
              </span>
              <span class="simple-mode-copy">显示分数，85分通关</span>
            </span>
          </button>
        </div>
      </div>

      <footer class="onboarding-footer">
        <button class="primary-action" id="startButton" type="button">开始练习</button>
      </footer>
    </section>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const state = {
      mode: "encourage",
      settingsOpen: false,
      modeMenuOpen: false
    };

    const settingsButton = document.querySelector("#settingsButton");
    const settingsMenu = document.querySelector("#settingsMenu");
    const modeMenuRow = document.querySelector("#modeMenuRow");
    const modeSubmenu = document.querySelector("#modeSubmenu");
    const modeMenuValue = document.querySelector("#modeMenuValue");
    const modeOptions = document.querySelectorAll(".mode-option");
    const modeCards = document.querySelectorAll(".mode-card");
    const onboardingOverlay = document.querySelector("#onboardingOverlay");
    const closeOnboarding = document.querySelector("#closeOnboarding");
    const startButton = document.querySelector("#startButton");
    const tutorialMenuRow = document.querySelector("#tutorialMenuRow");
    const helpButton = document.querySelector("#helpButton");
    const voiceFeedback = document.querySelector("#voiceFeedback");
    const feedbackMain = document.querySelector("#feedbackMain");
    const feedbackSub = document.querySelector("#feedbackSub");
    const toast = document.querySelector("#toast");

    let toastTimer = 0;

    function modeLabel(mode) {
      return mode === "precise" ? "精准" : "鼓励";
    }

    function modeToast(mode) {
      return mode === "precise"
        ? "已切换为精准模式：显示分数，85分通关"
        : "已切换为鼓励模式：文字反馈，70分通关";
    }

    function showToast(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function updateFeedback() {
      voiceFeedback.classList.toggle("encourage", state.mode === "encourage");
      voiceFeedback.classList.toggle("precise", state.mode === "precise");
      if (state.mode === "precise") {
        feedbackMain.textContent = "88分，通过，可进入下一题";
        feedbackSub.textContent = "当前：精准模式";
      } else {
        feedbackMain.textContent = "良好！可以进入下一题";
        feedbackSub.textContent = "当前：鼓励模式";
      }
    }

    function selectMode(mode, announce = true) {
      state.mode = mode;
      modeMenuValue.textContent = modeLabel(mode);
      modeOptions.forEach((option) => {
        option.classList.toggle("selected", option.dataset.mode === mode);
      });
      modeCards.forEach((card) => {
        card.classList.toggle("selected", card.dataset.mode === mode);
      });
      updateFeedback();
      if (announce) showToast(modeToast(mode));
    }

    function setSettings(open) {
      state.settingsOpen = open;
      settingsMenu.hidden = !open;
      settingsButton.setAttribute("aria-expanded", String(open));
      if (!open) setModeMenu(false);
    }

    function setModeMenu(open) {
      state.modeMenuOpen = open;
      modeSubmenu.hidden = !open;
      modeMenuRow.classList.toggle("active", open);
    }

    function closeGuide(announce = true) {
      onboardingOverlay.hidden = true;
      if (announce) showToast(`${modeLabel(state.mode)}模式已生效，可在设置中调整`);
    }

    settingsButton.addEventListener("click", (event) => {
      event.stopPropagation();
      setSettings(!state.settingsOpen);
    });

    modeMenuRow.addEventListener("click", (event) => {
      event.stopPropagation();
      setModeMenu(!state.modeMenuOpen);
    });

    tutorialMenuRow.addEventListener("click", (event) => {
      event.stopPropagation();
      onboardingOverlay.hidden = false;
      setSettings(false);
    });

    helpButton.addEventListener("click", () => {
      onboardingOverlay.hidden = false;
    });

    modeOptions.forEach((option) => {
      option.addEventListener("click", (event) => {
        event.stopPropagation();
        selectMode(option.dataset.mode);
      });
    });

    modeCards.forEach((card) => {
      card.addEventListener("click", () => {
        selectMode(card.dataset.mode);
      });
    });

    closeOnboarding.addEventListener("click", () => closeGuide(false));
    startButton.addEventListener("click", () => closeGuide(true));

    document.addEventListener("click", () => {
      setSettings(false);
    });

    settingsMenu.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    modeSubmenu.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (!onboardingOverlay.hidden) {
          closeGuide(false);
          return;
        }
        setSettings(false);
      }
    });

    selectMode("encourage", false);
    onboardingOverlay.hidden = false;
  </script>
</body>
</html>
